
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELURA — Premium Clothing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:       #0E0D0B;
  --bg2:      #161410;
  --bg3:      #1E1B17;
  --card:     #181512;
  --border:   #2A2520;
  --border2:  #3A342D;
  --text:     #F0EAE0;
  --text2:    #8C8278;
  --text3:    #5C544C;
  --accent:   #D4622A;
  --accent2:  #A8461A;
  --gold:     #C9A96E;
  --success:  #4CAF78;
  --danger:   #E05555;
  --white:    #FFFFFF;
  --shadow:   0 4px 24px rgba(0,0,0,0.4);
  --shadow2:  0 12px 48px rgba(0,0,0,0.6);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── TOPBAR ─────────────────────────────────────────────────── */
.topbar{background:var(--accent);color:var(--white);text-align:center;padding:0.45rem;font-size:0.78rem;letter-spacing:0.12em;font-weight:500;text-transform:uppercase;}

/* ── NAV ────────────────────────────────────────────────────── */
nav{background:rgba(14,13,11,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:70px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;letter-spacing:0.08em;color:var(--text);}
.nav-logo span{color:var(--accent);}
.nav-cats{display:flex;gap:2rem;}
.nav-cat{color:var(--text2);font-size:0.82rem;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:color 0.2s;border:none;background:none;padding:0;font-family:'DM Sans',sans-serif;}
.nav-cat:hover,.nav-cat.active{color:var(--text);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-search{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:0.4rem 0.8rem;gap:0.5rem;}
.nav-search input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.83rem;width:160px;}
.nav-search input::placeholder{color:var(--text3);}
.nav-search svg{color:var(--text3);flex-shrink:0;}
.cart-trigger{display:flex;align-items:center;gap:0.5rem;background:var(--accent);color:var(--white);border:none;padding:0.55rem 1.1rem;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:500;letter-spacing:0.04em;transition:background 0.2s;position:relative;}
.cart-trigger:hover{background:var(--accent2);}
.cart-badge{background:var(--white);color:var(--accent);border-radius:50%;width:18px;height:18px;font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── HERO ───────────────────────────────────────────────────── */
.hero{min-height:88vh;background:var(--bg2);display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 70% 50%, rgba(212,98,42,0.12) 0%, transparent 70%);}
.hero-left{padding:7rem 5% 5rem 8%;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1;}
.hero-eyebrow{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;}
.hero-line{width:40px;height:1px;background:var(--accent);}
.hero-eyebrow span{font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:500;}
.hero-h1{font-family:'Playfair Display',serif;font-size:5rem;font-weight:400;line-height:1.0;margin-bottom:1.75rem;color:var(--text);}
.hero-h1 em{color:var(--accent);font-style:italic;}
.hero-p{color:var(--text2);font-size:0.97rem;line-height:1.75;margin-bottom:2.5rem;max-width:420px;font-weight:300;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-fill{background:var(--accent);color:var(--white);border:none;padding:0.9rem 2.2rem;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.25s;}
.btn-fill:hover{background:var(--accent2);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2);padding:0.9rem 2rem;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.25s;}
.btn-ghost:hover{border-color:var(--text);}
.hero-right{position:relative;overflow:hidden;}
.hero-img-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;height:100%;}
.hero-img-grid div{overflow:hidden;}
.hero-img-grid div img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease;}
.hero-img-grid div:hover img{transform:scale(1.05);}
.hero-img-grid div:nth-child(1){grid-row:1/3;}
.hero-stats{display:flex;gap:3rem;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);}
.hero-stat-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:500;color:var(--text);display:block;}
.hero-stat-label{font-size:0.75rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.2rem;}

/* ── CATEGORY STRIP ─────────────────────────────────────────── */
.cat-strip{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg2);padding:0 5%;}
.cat-strip::-webkit-scrollbar{display:none;}
.cat-pill{padding:1rem 1.5rem;font-size:0.8rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;margin-bottom:-1px;}
.cat-pill:hover{color:var(--text);}
.cat-pill.active{color:var(--accent);border-color:var(--accent);}

/* ── SECTION ────────────────────────────────────────────────── */
.section{padding:4rem 5%;}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2.5rem;gap:1rem;flex-wrap:wrap;}
.section-title{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:400;color:var(--text);}
.section-count{font-size:0.8rem;color:var(--text3);letter-spacing:0.08em;}
.sort-row{display:flex;align-items:center;gap:0.75rem;}
.sort-label{font-size:0.78rem;color:var(--text3);}
.sort-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:0.45rem 0.9rem;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.8rem;outline:none;cursor:pointer;}

/* ── PRODUCT GRID ───────────────────────────────────────────── */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.5px;}
.product-card{background:var(--card);cursor:pointer;position:relative;transition:transform 0.3s;}
.product-card:hover{transform:translateY(-3px);z-index:1;}
.product-card:hover .card-overlay{opacity:1;}
.product-card:hover .card-img img{transform:scale(1.06);}
.card-img{height:360px;overflow:hidden;position:relative;background:var(--bg3);}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;background:linear-gradient(145deg,var(--bg3),var(--border));}
.card-badge{position:absolute;top:14px;left:14px;background:var(--accent);color:var(--white);font-size:0.65rem;font-weight:600;padding:0.25rem 0.65rem;letter-spacing:0.1em;text-transform:uppercase;border-radius:1px;}
.card-badge.new-badge{background:var(--success);}
.card-badge.oos-badge{background:var(--text3);}
.card-overlay{position:absolute;inset:0;background:rgba(14,13,11,0.55);display:flex;align-items:flex-end;justify-content:center;padding:1.5rem;opacity:0;transition:opacity 0.3s;}
.quick-add{width:100%;background:var(--white);color:var(--bg);border:none;padding:0.75rem;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;border-radius:1px;}
.quick-add:hover{background:var(--accent);color:var(--white);}
.card-body{padding:1.25rem 1.1rem;}
.card-cat{font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:0.4rem;}
.card-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:400;color:var(--text);margin-bottom:0.5rem;line-height:1.3;}
.card-prices{display:flex;align-items:center;gap:0.6rem;}
.card-price{font-size:1rem;font-weight:600;color:var(--accent);}
.card-old{font-size:0.85rem;color:var(--text3);text-decoration:line-through;}
.card-sizes{display:flex;gap:0.35rem;margin-top:0.75rem;flex-wrap:wrap;}
.sz{font-size:0.68rem;border:1px solid var(--border2);color:var(--text2);padding:0.18rem 0.5rem;cursor:pointer;transition:all 0.15s;font-weight:500;}
.sz:hover,.sz.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.sz.oos{opacity:0.3;cursor:not-allowed;text-decoration:line-through;}
.no-products{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text3);}
.no-products span{font-size:3rem;display:block;margin-bottom:1rem;}

/* ── PRODUCT DETAIL MODAL ───────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px);}
.overlay.on{opacity:1;pointer-events:all;}
.product-modal{position:fixed;inset:0;z-index:201;display:flex;align-items:center;justify-content:center;padding:2rem;pointer-events:none;opacity:0;transition:opacity 0.3s;}
.product-modal.on{opacity:1;pointer-events:all;}
.pmodal-box{background:var(--card);border:1px solid var(--border);border-radius:4px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);display:grid;grid-template-columns:1fr 1fr;transform:scale(0.96);transition:transform 0.3s;}
.product-modal.on .pmodal-box{transform:scale(1);}
.pmodal-imgs{position:relative;background:var(--bg3);min-height:460px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pmodal-imgs img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.pmodal-imgs .big-emoji{font-size:7rem;}
.pmodal-badge{position:absolute;top:16px;left:16px;background:var(--accent);color:var(--white);font-size:0.7rem;font-weight:600;padding:0.3rem 0.7rem;letter-spacing:0.1em;text-transform:uppercase;}
.pmodal-info{padding:2.5rem 2rem;display:flex;flex-direction:column;gap:0;}
.pmodal-cat{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:0.6rem;}
.pmodal-name{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;line-height:1.2;margin-bottom:0.75rem;}
.pmodal-prices{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.75rem;}
.pmodal-price{font-size:1.5rem;font-weight:600;color:var(--accent);}
.pmodal-old{font-size:1rem;color:var(--text3);text-decoration:line-through;}
.pmodal-save{background:rgba(212,98,42,0.15);color:var(--accent);font-size:0.75rem;padding:0.2rem 0.6rem;border-radius:2px;font-weight:600;}
.pmodal-desc{font-size:0.88rem;color:var(--text2);line-height:1.7;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.pmodal-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:0.6rem;font-weight:600;}
.pmodal-sizes{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.psz{border:1px solid var(--border2);color:var(--text2);padding:0.45rem 0.9rem;font-size:0.82rem;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.psz:hover,.psz.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.psz.oos{opacity:0.3;cursor:not-allowed;}
.qty-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border2);}
.qty-btn{width:36px;height:36px;background:none;border:none;color:var(--text);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background 0.15s;font-family:'DM Sans',sans-serif;}
.qty-btn:hover{background:var(--border);}
.qty-num{width:36px;text-align:center;font-size:0.9rem;font-weight:500;}
.pmodal-add{flex:1;background:var(--accent);color:var(--white);border:none;padding:0.85rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;border-radius:2px;}
.pmodal-add:hover{background:var(--accent2);}
.pmodal-close{position:absolute;top:1rem;right:1rem;background:rgba(0,0,0,0.5);border:none;color:var(--white);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s;z-index:2;}
.pmodal-close:hover{background:rgba(0,0,0,0.8);}
.stock-note{font-size:0.75rem;color:var(--text3);margin-top:0.5rem;}
.stock-note.low{color:#E0A555;}

/* ── CART DRAWER ────────────────────────────────────────────── */
.cart-drawer{position:fixed;right:0;top:0;width:440px;max-width:100vw;height:100vh;background:var(--bg2);z-index:300;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;border-left:1px solid var(--border);box-shadow:var(--shadow2);}
.cart-drawer.on{transform:translateX(0);}
.cart-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:299;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.cart-drawer-overlay.on{opacity:1;pointer-events:all;}
.cd-head{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cd-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;}
.cd-count{font-size:0.8rem;color:var(--text3);margin-top:0.15rem;}
.cd-close{background:none;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.cd-close:hover{border-color:var(--text);color:var(--text);}
.cd-items{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.cd-empty{text-align:center;padding:4rem 1rem;color:var(--text3);}
.cd-empty-icon{font-size:3rem;margin-bottom:1rem;}
.cart-item{display:grid;grid-template-columns:80px 1fr;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);}
.ci-img{width:80px;height:96px;overflow:hidden;background:var(--bg3);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
.ci-img img{width:100%;height:100%;object-fit:cover;}
.ci-cat{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.2rem;}
.ci-name{font-family:'Playfair Display',serif;font-size:0.97rem;margin-bottom:0.25rem;line-height:1.3;}
.ci-meta{font-size:0.75rem;color:var(--text3);margin-bottom:0.5rem;}
.ci-controls{display:flex;align-items:center;gap:0.6rem;}
.ci-qty{display:flex;align-items:center;border:1px solid var(--border2);}
.ci-qbtn{width:26px;height:26px;background:none;border:none;color:var(--text);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.ci-qbtn:hover{background:var(--border);}
.ci-qval{width:26px;text-align:center;font-size:0.83rem;font-weight:600;}
.ci-price{font-weight:600;font-size:0.92rem;color:var(--accent);margin-left:auto;}
.ci-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.75rem;padding:0.2rem;transition:color 0.2s;margin-left:0.25rem;}
.ci-remove:hover{color:var(--danger);}
.cd-footer{padding:1.5rem;border-top:1px solid var(--border);}
.cd-totals{margin-bottom:1.25rem;}
.cd-row{display:flex;justify-content:space-between;font-size:0.85rem;color:var(--text2);margin-bottom:0.4rem;}
.cd-row.grand{font-size:1.05rem;font-weight:600;color:var(--text);margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);}
.cd-checkout{width:100%;background:var(--accent);color:var(--white);border:none;padding:1rem;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:0.6rem;}
.cd-checkout:hover{background:var(--accent2);}
.free-ship-note{text-align:center;font-size:0.75rem;color:var(--text3);margin-bottom:1rem;}
.free-ship-bar{height:3px;background:var(--border);border-radius:2px;margin-top:0.4rem;overflow:hidden;}
.free-ship-fill{height:100%;background:var(--success);transition:width 0.5s;}

/* ── CHECKOUT MODAL ─────────────────────────────────────────── */
.modal{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal.on{opacity:1;pointer-events:all;}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);}
.modal-box{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:6px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);transform:translateY(20px);transition:transform 0.3s;}
.modal.on .modal-box{transform:translateY(0);}
.modal-head{padding:1.75rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;}
.modal-sub{font-size:0.78rem;color:var(--text3);margin-top:0.2rem;}
.modal-close{background:none;border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.modal-close:hover{border-color:var(--text);color:var(--text);}
.modal-body{padding:2rem;}
.field{margin-bottom:1.3rem;}
.field-label{display:block;font-size:0.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.45rem;}
.field-input{width:100%;padding:0.8rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.field-input:focus{border-color:var(--accent);}
.field-input.err{border-color:var(--danger);}
.field-error{font-size:0.72rem;color:var(--danger);margin-top:0.3rem;display:none;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.field-select{width:100%;padding:0.8rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;cursor:pointer;}
.order-preview{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1.25rem;margin-bottom:1.5rem;}
.op-title{font-size:0.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem;}
.op-item{display:flex;justify-content:space-between;font-size:0.83rem;color:var(--text2);margin-bottom:0.35rem;}
.op-divider{border:none;border-top:1px solid var(--border);margin:0.75rem 0;}
.op-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:600;color:var(--text);}
.op-total span:last-child{color:var(--accent);}
.payment-opts{display:flex;flex-direction:column;gap
